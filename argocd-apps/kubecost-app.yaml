apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubecost
  namespace: argocd
spec:
  project: default
  source:
    chart: cost-analyzer
    repoURL: https://kubecost.github.io/cost-analyzer/
    targetRevision: 2.3.1
    helm:
      valueFiles:
        - ../monitoring/kubecost-values.yaml # 위에서 만든 설정 파일 참조
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring # {{ kubecost_namespace }} 반영
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true