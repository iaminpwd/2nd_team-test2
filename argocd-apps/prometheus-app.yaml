apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  sources:
    - chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 51.2.0 # 운영 안정성을 위해 버전을 고정하는 것을 권장합니다.
      helm:
        valueFiles:
          - $values/gitops/monitoring/prometheus-stack-values.yaml
    - repoURL: https://github.com/팀명/aws-k8s-ansible-4weeks.git # 본인들의 실제 Git 주소로 변경하세요!
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true