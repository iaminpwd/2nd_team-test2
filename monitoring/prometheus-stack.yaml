prometheus:
  prometheusSpec:
    scrapeInterval: "1m"
    evaluationInterval: "1m"
    nodeSelector:
      kubernetes.io/hostname: "k3s-worker-1"
    externalLabels:
      cluster_id: "finops-k3s"
    retention: 10d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

prometheusOperator:
  nodeSelector:
    kubernetes.io/hostname: "k3s-worker-1"

prometheus-node-exporter:
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: instance
          action: replace

grafana:
  adminPassword: "1234"
  nodeSelector:
    kubernetes.io/hostname: "k3s-worker-1"
  persistence:
    enabled: true
    type: pvc
    size: 500Mi
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
  grafana.ini:
    dashboards:
      min_refresh_interval: 1s
  dashboards:
    default:
      kubecost-official:
        url: "https://raw.githubusercontent.com/kubecost/cost-analyzer-helm-chart/develop/cost-analyzer/dashboards/cost-overview.json"
        datasource: Prometheus