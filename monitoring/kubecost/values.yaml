global:
  clusterId: "finops-k3s"
  prometheus:
    enabled: false 
    fqdn: "http://prometheus-stack-kube-prom-prometheus.monitoring.svc:9090"
  grafana:
    enabled: false
    proxy: false 

serviceMonitor:
  enabled: true
prometheusRule:
  enabled: true

kubecostFrontend:
  resources:
    requests:
      memory: "64Mi"
      cpu: "10m"
    limits:
      memory: "128Mi"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 20

kubecostProductConfigs:
  grafanaURL: ""

forecasting:
  enabled: false

kubecostModel:
  retentionDaily: 3
  retentionHourly: 3
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"

kubecostAggregator:
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"

customPricing:
  enabled: true
  cpu: "0.0316"
  ram: "0.0042"
  storage: "0.0001"

nodeSelector:
  "kubernetes.io/hostname": "k3s-worker-1"